<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skills - Hydan Cheruyot</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .navbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #001100;
      border-bottom: 1px solid #00ff66;
      box-shadow: 0 0 10px #00ff66;
      padding: 0.9rem 5%;
      position: fixed;
      top: 0;
      z-index: 1000;
    }
    .navbar .logo {
      color: #00ff66;
      font-weight: bold;
      text-decoration: none;
      font-size: 1.2rem;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }
    .nav-links a {
      color: #00ff66;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .nav-links a:hover {
      color: orange;
    }

    body {
      background-color: #000;
      color: #00ff66;
      font-family: 'Courier New', monospace;
      padding-top: 60px;
      margin: 0;
      overflow-x: hidden;
      position: relative;
    }

    main {
      max-width: 900px;
      margin: 3rem auto;
      padding: 2rem;
      position: relative;
      box-shadow: 0 0 10px #00ff66;
      background: #000;
      border: 1px solid #00ff66;
      border-radius: 6px;
      min-height: 400px;
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 255, 102, 0.05),
        rgba(0, 255, 102, 0.05) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 1;
    }

    .terminal-output {
      white-space: pre-wrap;
      font-size: 1rem;
      line-height: 1.5;
      color: #00ff66;
      text-shadow: 0 0 8px #00ff66;
      position: relative;
      z-index: 2;
      min-height: 300px;
    }

    .console-cursor {
      display: inline-block;
      color: #00ff66;
      animation: blink 1s steps(1) infinite;
      font-weight: bold;
      position: relative;
      z-index: 2;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="logo">Hydan Cheruyot</a>
    <ul class="nav-links">
      <li><a href="home.html" id="nav-home">Home</a></li>
      <li><a href="skills.html" id="nav-skills">Skills</a></li>
      <li><a href="projects.html" id="nav-projects">Projects</a></li>
      <li><a href="contacts.html" id="nav-contacts">Contact</a></li>
    </ul>
  </nav>

  <main>
    <pre class="terminal-output" id="terminal-output"></pre><span class="console-cursor">▌</span>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const terminal = document.getElementById("terminal-output");
      const cursor = document.querySelector(".console-cursor");

      const sections = [
        {
          lines: [
            "> initializing skills...",
            "> system check: OK ✅",
            "> displaying skillset:",
            ""
          ],
          delayAfter: 800
        },
        {
          lines: [
            "> programming_languages --show",
            "- Python 🐍",
            "- JavaScript (React, Node.js)",
            "- HTML5 & CSS3",
            "- SQL",
            "- C / C++",
            ""
          ],
          delayAfter: 1000
        },
        {
          lines: [
            "> technical_skills --show",
            "- Operating System Installation & Configuration",
            "- Computer Hardware Repair & Maintenance",
            "- Network Troubleshooting & Configuration",
            "- Software Deployment & Updates",
            "- Web Development (Front-end & Back-end)",
            ""
          ],
          delayAfter: 1000
        },
        {
          lines: [
            "> tools --show",
            "- VS Code",
            "- Git & GitHub",
            "- Linux (Kali, Parrot OS)",
            "- Postman",
            "- Docker",
            "- VirtualBox / VMware",
            ""
          ],
          delayAfter: 1000
        },
        {
          lines: [
            "> other_skills --show",
            "- Ethical Hacking & Cybersecurity Fundamentals",
            "- Penetration Testing Basics",
            "- Photo & Video Editing (Lightroom, Photoshop)",
            "- Communication & Team Collaboration",
            ""
          ],
          delayAfter: 1500
        },
        {
          lines: [
            "> end of skillset",
            "> returning to main console...",
            ""
          ],
          delayAfter: 2500
        }
      ];

      const typingSpeed = 35;
      const linePause = 350;

      let sectionIndex = 0;
      let lineIndex = 0;
      let charIndex = 0;
      let currentLine = "";
      let typing = true;

      function type() {
        if (sectionIndex >= sections.length) {
          setTimeout(() => {
            terminal.textContent = "";
            sectionIndex = 0;
            lineIndex = 0;
            charIndex = 0;
            currentLine = "";
            typing = true;
            type();
          }, 1500);
          return;
        }

        const section = sections[sectionIndex];
        if (lineIndex < section.lines.length) {
          currentLine = section.lines[lineIndex];
          if (typing) {
            terminal.textContent += currentLine.charAt(charIndex);
            charIndex++;
            if (charIndex < currentLine.length) {
              setTimeout(type, typingSpeed);
            } else {
              typing = false;
              terminal.textContent += "\n";
              setTimeout(type, linePause);
            }
          } else {
            lineIndex++;
            charIndex = 0;
            typing = true;
            setTimeout(type, typingSpeed);
          }
        } else {
          sectionIndex++;
          lineIndex = 0;
          charIndex = 0;
          setTimeout(type, section.delayAfter);
        }
      }

      type();
    });
  </script>
  <footer class="footer">
    <p>
      © 2025 Hydan Cheruyot |
      Developer: <a href="https://github.com/DanHacks">DanHacks</a> |
      GitHub: <a href="https://github.com/DanHacks">github.com/DanHacks</a> |
      LinkedIn: <a href="https://linkedin.com/in/hydan-cheruyot-8a6132231">Hydan Cheruyot</a>
    </p>
  </footer>
  <script>
    const currentPage = window.location.pathname.split('/').pop();
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
